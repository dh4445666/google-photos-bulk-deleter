name: Build Standalone Executables

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: gdpd.exe
            asset_name: gdpd-Windows.exe
          - os: ubuntu-latest
            artifact_name: gdpd
            asset_name: gdpd-Linux
            
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --console --name "gdpd" --add-data "content.js:." app.py

      - name: Rename Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: move dist\gdpd.exe dist\${{ matrix.asset_name }}

      - name: Rename Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/gdpd dist/${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
